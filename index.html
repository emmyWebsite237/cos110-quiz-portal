<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COS 110 Portal | Examination Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; width: 100%; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 10px 30px rgba(148, 163, 184, 0.12); border-radius: 24px; }
        .glass-input { background: rgba(255, 255, 255, 0.9); border: 1px solid #cbd5e1; border-radius: 14px; color: #0f172a; transition: all 0.3s ease; }
        .glass-input:focus { background: #ffffff; border-color: #4f46e5; box-shadow: 0 0 12px rgba(79, 70, 229, 0.15); outline: none; }
        .option-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; transition: all 0.2s ease; cursor: pointer; user-select: none; }
        .option-card:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .option-card.selected { background: linear-gradient(135deg, rgba(79, 70, 229, 0.08), rgba(147, 51, 234, 0.08)); border-color: #4f46e5; }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex items-center justify-center p-4 relative">

    <main class="w-full max-w-2xl z-10 my-6">

        <section id="screen-welcome" class="glass-card p-8 md:p-12 text-center">
            <div class="mb-6 flex justify-center">
                <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center border border-indigo-100 shadow-sm"><span class="text-2xl">📝</span></div>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">COS 110 Portal</h1>
            <p class="text-slate-500 mt-2 text-sm max-w-sm mx-auto">Enter your credentials to access the assessment tracks.</p>
            
            <div class="mt-6 max-w-md mx-auto text-left space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Student Full Name</label>
                    <input type="text" id="student-name" placeholder="Enter full name..." class="w-full px-4 py-3 glass-input text-base">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Questions to Load (30 - 50)</label>
                    <input type="number" id="configured-count" value="30" min="30" max="50" class="w-full px-4 py-3 glass-input text-base">
                </div>
            </div>

            <button onclick="validateAndGoToChapters()" class="mt-8 px-8 py-3.5 bg-indigo-600 hover:bg-indigo-700 font-semibold text-white rounded-xl shadow-md transition-all cursor-pointer">
                Proceed to Chapters
            </button>
        </section>


        <section id="screen-chapters" class="glass-card p-8 hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-900">Select Assessment Track</h2>
            </div>
            
            <div id="chapters-buttons-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                </div>
            
            <button onclick="switchScreen('screen-welcome')" class="mt-6 text-xs text-slate-400 hover:text-slate-600 font-medium transition-colors">← Back</button>
        </section>


        <section id="screen-quiz" class="glass-card p-6 md:p-8 hidden">
            <div class="flex justify-between items-center mb-4">
                <span id="quiz-progress-text" class="text-xs font-bold text-slate-400 uppercase">Question 1 of --</span>
                <div class="flex items-center space-x-2 bg-red-50 border border-red-100 px-4 py-1.5 rounded-full">
                    <span class="w-2 h-2 rounded-full bg-red-500 animate-ping"></span>
                    <span id="global-timer" class="text-sm font-mono font-bold text-red-600">20s</span>
                </div>
            </div>

            <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden mb-6">
                <div id="quiz-progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-300" style="width: 0%"></div>
            </div>

            <div class="mb-6"><h3 id="question-text" class="text-lg font-bold text-slate-900 leading-relaxed">Loading question data...</h3></div>

            <div class="space-y-3 mb-6">
                <div onclick="selectOption('a')" id="opt-a" class="option-card p-4 flex items-center"><span class="w-7 h-7 rounded bg-slate-50 flex items-center justify-center font-bold text-xs mr-4 border border-slate-200 shrink-0">(A)</span><span id="text-opt-a" class="text-slate-700 text-sm font-medium"></span></div>
                <div onclick="selectOption('b')" id="opt-b" class="option-card p-4 flex items-center"><span class="w-7 h-7 rounded bg-slate-50 flex items-center justify-center font-bold text-xs mr-4 border border-slate-200 shrink-0">(B)</span><span id="text-opt-b" class="text-slate-700 text-sm font-medium"></span></div>
                <div onclick="selectOption('c')" id="opt-c" class="option-card p-4 flex items-center"><span class="w-7 h-7 rounded bg-slate-50 flex items-center justify-center font-bold text-xs mr-4 border border-slate-200 shrink-0">(C)</span><span id="text-opt-c" class="text-slate-700 text-sm font-medium"></span></div>
                <div onclick="selectOption('d')" id="opt-d" class="option-card p-4 flex items-center"><span class="w-7 h-7 rounded bg-slate-50 flex items-center justify-center font-bold text-xs mr-4 border border-slate-200 shrink-0">(D)</span><span id="text-opt-d" class="text-slate-700 text-sm font-medium"></span></div>
            </div>

            <div class="flex justify-end">
                <button id="next-btn" onclick="advanceQuiz()" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl text-sm transition-all cursor-pointer">Next Question</button>
            </div>
        </section>


        <section id="screen-result" class="glass-card p-8 text-center hidden">
            <div class="text-4xl mb-3">🏆</div>
            <h2 class="text-2xl font-bold text-slate-900">Session Complete</h2>
            <p class="text-slate-500 text-sm mt-1">Thank you, <span id="result-display-name" class="font-semibold text-slate-800"></span>.</p>
            
            <div class="my-6">
                <span class="block text-xs uppercase tracking-wider text-slate-400 font-semibold mb-1">Total Score</span>
                <div class="text-5xl font-extrabold text-indigo-600" id="final-score-display">0 / 0</div>
                <div class="text-sm font-bold text-slate-500 mt-2 bg-slate-100 inline-block px-4 py-1 rounded-full border border-slate-200" id="final-percentage-display">0%</div>
            </div>

            <div class="flex flex-col sm:flex-row gap-2 justify-center">
                <button onclick="buildAndShowPreview()" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold rounded-xl cursor-pointer">Review Performance Preview</button>
                <button onclick="location.reload()" class="px-5 py-2 bg-slate-100 text-slate-700 text-xs border border-slate-200 rounded-xl cursor-pointer">Start New Run</button>
            </div>
        </section>


        <section id="screen-preview" class="glass-card p-6 hidden">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-200">
                <h2 class="text-lg font-bold text-slate-900">Performance Assessment Sheet</h2>
                <button onclick="switchScreen('screen-result')" class="text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 cursor-pointer">Back</button>
            </div>
            <div id="preview-items-container" class="space-y-4 max-h-[55vh] overflow-y-auto pr-2"></div>
        </section>

    </main>

    <script>
let appState = { studentName: "", targetCount: 30, selectedPool: [], currentQuestionIndex: 0, answersRecorded: {}, countdownInterval: null, timeRemaining: 10 };
     
     // --- MASTER EMBEDDED QUESTION BANK ---
     // Declare your database directly as a standard object. 
     // Do NOT use backticks, single quotes, or double quotes around the outermost curly braces.
     let masterDatabase = {"chapter1":[{"id":1782296890753.7844,"question":"Which parameter is used to quantify the physical size reduction achieved when thousands of discrete logic gates are consolidated into an integrated architecture during the Fourth Generation?","a":"Structural density","b":"Component integration scale","c":"Component integration scale (c) Lithographic aspect ratio","d":"Microscopic pitch index","answer":"b"},{"id":1782296890753.8762,"question":"When transitioning from vacuum tubes to early transistors, what fundamental solid-state property allowed the latter to act as switches without requiring continuous heating elements?","a":"Thermionic electron emission","b":"Controlled semiconductor conduction via doping","c":"Controlled semiconductor conduction via doping (c) Dielectric breakdown resistance","d":"Photoelectric charge preservation","answer":"b"},{"id":1782296890753.1875,"question":"In the classic von Neumann computer architecture, which structural component is explicitly responsible for decoding instructional operational codes and coordinating the data paths between memory and execution units?","a":"Arithmetic Logic Unit","b":"Control Unit","c":"Control Unit (c) Backing Storage Subsystem","d":"Accumulator Register","answer":"b"},{"id":1782296890753.2432,"question":"What physical component was leveraged by the Atanasoff-Berry Computer (ABC) to implement its volatile electrostatic memory architecture?","a":"Miniature magnetic cores","b":"Dual-triode vacuum tubes","c":"Dual-triode vacuum tubes (c) Arrays of discrete electrical capacitors","d":"Rotating magnetic iron drums","answer":"c"},{"id":1782296890753.2722,"question":"Why did early mechanical computing pioneers like Leibniz favor the theoretical transition to binary numeric representation over standard human decimal formats?","a":"Binary reduced the physical complexity of gear fluting down to two discrete geometric positions","b":"Decimal gear configurations lacked the mathematical capability to compute square roots","c":"Decimal gear configurations lacked the mathematical capability to compute square roots (c) Binary arithmetic entirely eliminated the requirement for an execution mill","d":"Decimal systems were physically incompatible with the concept of negative numbers","answer":"a"},{"id":1782296890754.921,"question":"During the 1970s mainframe era, what was the primary architectural bottleneck that forced the utilization of offline batch mode processing over interactive terminal usage?","a":"The inability of magnetic core memory to sustain simultaneous byte addresses","b":"The massive latency of mechanical line-printing feedback units","c":"The massive latency of mechanical line-printing feedback units (c) The high structural and operational cost of CPU time sharing over multiple execution streams","d":"The signal degradation of early teletype terminal connections across long physical distances","answer":"c"},{"id":1782296890754.028,"question":"The \"Garbage In, Garbage Out\" (GIGO) principle mathematically underscores that a computer's final operational output cannot exceed the structural validity of which metric?","a":"Processing clock frequency","b":"The logical integrity and accuracy of the input data stream","c":"The logical integrity and accuracy of the input data stream (c) The bit-depth of the processing word length","d":"The total storage density of the backing memory unit","answer":"b"},{"id":1782296890754.5784,"question":"What revolutionary structural mechanism did Joseph-Marie Jacquard introduce to abstractly store intricate woven textile patterns in a machine-readable form?","a":"Fluted stair-step cylindrical drums","b":"Interlinked ivory counting rods","c":"Interlinked ivory counting rods (c) Sequencing arrays of durable punched paper cards","d":"Manually adjusted electrical patch-cord walls","answer":"c"},{"id":1782296890754.1882,"question":"In Charles Babbage's conceptual designs for the Analytic Engine, what runtime logical capability distinguished its programmatic framework from simple calculators?","a":"Real-time floating-point arithmetic translation","b":"Conditional branching based on operational states during execution","c":"Conditional branching based on operational states during execution (c) Multitasking via an operating system kernel","d":"Electronic data storage using magnetic drums","answer":"b"},{"id":1782296890754.898,"question":"The architectural word length of a microcomputer (such as 16-bit versus 64-bit systems) directly determines which fundamental system capability?","a":"The physical rotation speed of external backing storage platters","b":"The number of binary digits the central processing unit can manipulate simultaneously","c":"The number of binary digits the central processing unit can manipulate simultaneously (c) The thermodynamic heat generation rate of the integrated circuit","d":"The maximum transmission distance of localized network patch cords","answer":"b"},{"id":1782296890754.0647,"question":"Why did the early British Colossus machine fail to meet the formal definition of a modern general-purpose digital computer?","a":"It relied entirely on mechanical gear-clocks instead of electronic components","b":"It lacked the architectural versatility to be dynamically reprogrammed for diverse mathematical operations","c":"It lacked the architectural versatility to be dynamically reprogrammed for diverse mathematical operations (c) It calculated numbers using decimal structures rather than binary notation","d":"It possessed no internal arithmetic execution unit","answer":"b"},{"id":1782296890754.0654,"question":"What physical phenomenon required early First Generation computer rooms to install massive cooling frameworks operating at high wattages?","a":"The thermal energy produced by thousands of high-heat thermionic vacuum tubes","b":"The frictional heat of rotating 50-foot electromechanical drive shafts","c":"The frictional heat of rotating 50-foot electromechanical drive shafts (c) The static electricity generated by paper punch cards running through hoppers","d":"The magnetic flux dissipation of primitive storage drums","answer":"a"},{"id":1782296890754.7122,"question":"What specific memory technology replaced magnetic drums during the Second Generation to offer non-volatile, rapid electronic data access?","a":"Dynamic Random Access Memory","b":"Magnetic core memory matrices","c":"Magnetic core memory matrices (c) Erasable Programmable Read-Only Memory","d":"Electrostatic capacitor arrays","answer":"b"},{"id":1782296890754.395,"question":"The Intel 4004 microprocessor historical design was structurally optimized from a complex multi-chip request down to a single general-purpose programmable chip primarily to achieve what?","a":"A faster processing speed exceeding 100 GHz","b":"The elimination of the requirement for separate keyboard and printer components","c":"The elimination of the requirement for separate keyboard and printer components (c) An affordable development framework by spreading manufacturing costs across diverse users","d":"Complete compatibility with existing First Generation machine languages","answer":"c"},{"id":1782296890754.4602,"question":"In high-performance scientific supercomputing, what architectural paradigm is leveraged to bypass the physical execution limits of standard serial processing units?","a":"Batch mode scheduling via key punch inputs","b":"Highly parallelized processing configurations utilizing superconductors","c":"Highly parallelized processing configurations utilizing superconductors (c) Increased physical length of internal copper rotating shafts","d":"Conversion of binary strings into complex decimal matrix arrays","answer":"b"},{"id":1782296890754.6929,"question":"What architectural feature introduced during the Third Generation allowed a single computer system to seamlessly execute multiple tasks concurrently?","a":"Hardwired manual patch cords","b":"Operating systems that supported multitasking capabilities","c":"Operating systems that supported multitasking capabilities (c) Symbolic assembly code translation layers","d":"The incorporation of 2,300 discrete transistors","answer":"b"},{"id":1782296890754.3828,"question":"Under the definition provided by the British Computer Society, what is the core operational sequence that a machine must execute under a stored program?","a":"Accept data, process data, and provide the results of that processing","b":"Type words, print text layout, and compress audio files","c":"Type words, print text layout, and compress audio files (c) Shift mechanical gears, increment odometers, and adjust dial indicators","d":"Detect hole patterns, verify ticket validity, and prevent fraudulent claims","answer":"a"},{"id":1782296890754.7737,"question":"What structural limitation of early human computation in the 19th and 20th centuries directly motivated military commands to fund electronic alternatives?","a":"Human computers could not understand binary number systems","b":"The excessive error rates and slow production speeds of manual mathematical tables under high demand","c":"The excessive error rates and slow production speeds of manual mathematical tables under high demand (c) The physical space requirements of housing room-sized mechanical slide rules","d":"The legal restriction against women working on advanced mathematical equations","answer":"b"},{"id":1782296890754.3418,"question":"How does an embedded computer differ in its fundamental application scope from a standard personal computer?","a":"It operates entirely without using a set of instructions or binary bits","b":"It is dedicated exclusively to controlling and overseeing a specific external device or machine","c":"It is dedicated exclusively to controlling and overseeing a specific external device or machine (c) It possesses a much larger room-sized physical mainframe architecture","d":"It relies entirely on human operators to manually route every calculation","answer":"b"},{"id":1782296890754.8457,"question":"What breakthrough software concept did Konrad Zuse propose through his highly advanced \"Plankalkul\" framework?","a":"The world's first interactive graphical user interface","b":"The earliest high-level programming language environment","c":"The earliest high-level programming language environment (c) A method for running batch mode punch decks via radio signals","d":"An algorithmic model for cooling vacuum tube arrays","answer":"b"},{"id":1782296890754.3723,"question":"Why did Herman Hollerith design his punched card system to be a \"read/write\" technology rather than a static \"read-only\" layout?","a":"To allow intermediate analytical results to be permanently recorded onto new card sets across multiple passes","b":"To eliminate the need for mechanical gear counters inside the Census Tabulator","c":"To eliminate the need for mechanical gear counters inside the Census Tabulator (c) To allow train conductors to erase passenger information remotely","d":"To enable the machine to store data as electrical charges within capacitors","answer":"a"},{"id":1782296890754.4333,"question":"What core design metric is quantified by a computer's processor speed rating measured in Megahertz (MHz) or Gigahertz (GHz)?","a":"The capacity of the internal storage byte array","b":"The exact number of instructions executed per foot of wire","c":"The exact number of instructions executed per foot of wire (c) The number of operational processing cycles executed per second","d":"The physical width of the silicon microchip architecture","answer":"c"},{"id":1782296890754.0352,"question":"Which early computational pioneer successfully documented the concepts of subroutines and programmatic loops before the corresponding hardware was constructed?","a":"Blaise Pascal","b":"Ada Byron","c":"Ada Byron (c) Grace Hopper","d":"Herman Hollerith","answer":"b"},{"id":1782296890754.2554,"question":"What architectural component serves as the central processing unit's ultra-fast, temporary storage zone for data currently being manipulated?","a":"Backing flash disk","b":"External optical DVD","c":"External optical DVD (c) Internal memory register","d":"Magnetic tape reel","answer":"c"},{"id":1782296890754.48,"question":"In modern anti-lock braking systems (ABS), what explicit computing task is handled by the integrated embedded processor?","a":"Simulating hydrogen blast radiuses for safety","b":"Compressing audio files to save internal memory","c":"Compressing audio files to save internal memory (c) Monitoring real-time wheel rotation to detect and prevent dangerous skidding","d":"Authenticating the stylistic variations of the vehicle's driver","answer":"c"},{"id":1782296890754.1606,"question":"What physical limitation prevents modern silicon microprocessors from indefinitely increasing their clock speeds through simple voltage scaling?","a":"The structural degradation of paper card hoppers","b":"Thermal limits and excessive heat generation at extreme frequencies","c":"Thermal limits and excessive heat generation at extreme frequencies (c) The inability of binary notation to support values above 64 bits","d":"A systemic shortage of high-grade ivory counting materials","answer":"b"},{"id":1782296890754.1335,"question":"Which mathematical tool, invented by John Napier, laid the conceptual groundwork for the continuous mechanical sliding scales used in slide rules?","a":"Matrix determinants","b":"Logarithmic functions","c":"Logarithmic functions (c) Boolean logic gates","d":"Differential calculus equations","answer":"b"},{"id":1782296890755.7126,"question":"What was the core operational flaw that caused Wilhelm Schickard’s historical 1623 \"calculating clock\" to vanish from mainstream prominence?","a":"It was rejected by the British government due to extreme scale","b":"The premature death of the inventor due to the plague, combined with the machine's destruction by fire","c":"The premature death of the inventor due to the plague, combined with the machine's destruction by fire (c) Its structural reliance on vacuum tubes that routinely exploded","d":"An inability to calculate basic addition or subtraction equations","answer":"b"},{"id":1782296890755.8794,"question":"How did the structural layout of the Harvard Mark I ensure synchronous mechanical motion across its entire 51-foot length?","a":"By routing 500 miles of electrical patch cords to a single knob wall","b":"Through a continuous 50-foot rotating shaft driven by a centralized electric motor","c":"Through a continuous 50-foot rotating shaft driven by a centralized electric motor (c) By utilizing individual electrostatic capacitors that fired in a round-robin sequence","d":"By feeding a single endless strip of punched movie film through 4,000 gears","answer":"b"},{"id":1782296890755.8518,"question":"Which computing tier represents the absolute lowest level of instruction execution, understood natively by hardware without translation layers?","a":"Assembly language","b":"High-level compiled code","c":"High-level compiled code (c) Pure machine language","d":"Structured symbolic syntax","answer":"c"},{"id":1782296890755.1038,"question":"What fundamental shift in hardware manufacturing defines the boundaries of the Fourth Generation of computer history?","a":"The introduction of thermionic vacuum tubes into scientific labs","b":"The complete consolidation of an entire computer's processing components onto a single silicon microprocessor chip","c":"The complete consolidation of an entire computer's processing components onto a single silicon microprocessor chip (c) The replacement of core memory with massive rotating magnetic drums","d":"The manual assembly of individual transistors onto large copper circuit boards","answer":"b"},{"id":1782296890755.7388,"question":"Why is natural language processing considered a primary research target for future Fifth Generation computing systems?","a":"To allow computers to understand and respond to human speech without relying on traditional hardcoded syntax","b":"To bypass the binary restrictions of modern 64-bit processing architectures","c":"To bypass the binary restrictions of modern 64-bit processing architectures (c) To eliminate the need for operating system multitasking frameworks","d":"To replace electronic silicon chips with mechanical gear structures","answer":"a"},{"id":1782296890755.4634,"question":"What metric dictates the maximum physical storage capability of a computer's internal primary memory device?","a":"Total word length bit-depth","b":"The capacity quantified in total bytes","c":"The capacity quantified in total bytes (c) Processor clock frequency in Hertz","d":"The number of flutes on the execution drum","answer":"b"},{"id":1782296890755.4192,"question":"Which organizational dynamic led to the rapid market rise of the \"IBM and the seven dwarfs\" competitive ecosystem in the 1960s?","a":"The widespread transition of commercial enterprises from custom university devices to standardized mainframe systems","b":"The universal deployment of personal computers into residential student dorms","c":"The universal deployment of personal computers into residential student dorms (c) The sudden obsolescence of silicon chips in favor of vacuum tubes","d":"The complete automation of the global textile weaving industry","answer":"a"},{"id":1782296890755.493,"question":"What mechanical innovation allowed Gottfried Wilhelm Leibniz’s Stepped Reckoner to automate multiplication functions?","a":"A series of electrical relays firing in a binary sequence","b":"Cylindrical fluted drums featuring ten distinct stepped grooves","c":"Cylindrical fluted drums featuring ten distinct stepped grooves (c) Sliding ivory beads arranged on parallel wire frames","d":"Interlinked paper card networks driven by a steam engine","answer":"b"},{"id":1782296890755.4685,"question":"What structural element ensures that a computer operating under the \"Stored Program\" concept can alter its behavior without physical hardware modification?","a":"The manual rearranging of physical patch cords on a distribution wall","b":"The inclusion of instruction steps directly inside the same memory space as the data","c":"The inclusion of instruction steps directly inside the same memory space as the data (c) The continuous mechanical adjustment of gear flutes at runtime","d":"The external replacement of thermionic vacuum elements","answer":"b"},{"id":1782296890755.2778,"question":"Which operational mode allowed multiple individuals to access a single mainframe concurrently via motorized typewriters?","a":"Offline batch mode processing","b":"Round-robin time sharing configurations","c":"Round-robin time sharing configurations (c) Serial machine language execution","d":"Dedicated parallel supercomputing channels","answer":"b"},{"id":1782296890755.8323,"question":"What core engineering hurdle did Blaise Pascal encounter that ultimately limited the commercial accuracy and success of the Pascaline?","a":"The lack of clean electrical current to power the internal relays","b":"High mechanical friction and precise manufacturing tolerances required for the internal gear teeth","c":"High mechanical friction and precise manufacturing tolerances required for the internal gear teeth (c) The system's complete inability to calculate simple addition steps","d":"The massive room-sized physical weight of the structural casing","answer":"b"},{"id":1782296890755.9734,"question":"In modern computing systems, what is the explicit purpose of Erasable Programmable Read-Only Memory (EPROM)?","a":"To provide ultra-high-capacity backing storage for multimedia video files","b":"To store critical system firmware that remains intact without power but can be reprogrammed if needed","c":"To store critical system firmware that remains intact without power but can be reprogrammed if needed (c) To manage real-time multitasking execution queues inside the operating system","d":"To serve as a volatile electrostatic storage zone for running calculation programs","answer":"b"},{"id":1782296890755.9094,"question":"Which structural feature of the 1991 reconstruction of Babbage's Difference Engine proved the validity of his 19th-century theories?","a":"It functioned perfectly using 4,000 precisely machined mechanical parts without any electronic components","b":"It required a 5-horsepower electric motor to turn its central storage unit","c":"It required a 5-horsepower electric motor to turn its central storage unit (c) It calculated numeric tables using dynamic RAM arrays","d":"It compiled high-level assembly scripts in less than 20 seconds","answer":"a"},{"id":1782296890755.6624,"question":"Why are modern personal computers vastly superior to the historic ENIAC despite the ENIAC's massive physical scale?","a":"Modern systems use advanced vacuum tube cooling racks to prevent explosions","b":"Microprocessor integration allows billions of transistors to execute operations at gigahertz speeds on a tiny silicon chip","c":"Microprocessor integration allows billions of transistors to execute operations at gigahertz speeds on a tiny silicon chip (c) Modern home systems operate completely independently of any pre-written human instructions","d":"Personal computers utilize decimal representation to reduce mathematical rounding errors","answer":"b"},{"id":1782296890755.7646,"question":"What structural component allows a user to interact with a Fourth Generation computer using intuitive visual icons instead of text-based commands?","a":"A motorized teletype terminal","b":"A graphical user interface paired with a pointing device","c":"A graphical user interface paired with a pointing device (c) A manual key punch card deck","d":"A localized network instructional patch cord","answer":"b"},{"id":1782296890755.7144,"question":"What specific role did the company Busicom play in the development history of the first commercial microprocessor?","a":"They manufactured the vacuum tubes used to build the ENIAC system","b":"They funded Intel's initial research in exchange for a general-purpose programmable computer chip design","c":"They funded Intel's initial research in exchange for a general-purpose programmable computer chip design (c) They initiated the antitrust proceedings that broke up IBM's monopoly","d":"They designed the high-level language Plankalkul for wartime calculations","answer":"b"},{"id":1782296890755.124,"question":"Under the definitions of raw data and processed information, how is a student's final calculated grade point average categorized?","a":"As a collection of raw unprocessed numeric facts","b":"As meaningful, transformed information that holds clear significance","c":"As meaningful, transformed information that holds clear significance (c) As a volatile binary bit stream devoid of structural context","d":"As an unprogrammable sequence of instructional operations","answer":"b"},{"id":1782296890755.562,"question":"What operational metric is directly compromised when an operator inputs flawed data into an accurately programmed computing system?","a":"The processing speed of the internal clock","b":"The logical correctness of the final output (GIGO)","c":"The logical correctness of the final output (GIGO) (c) The structural bit-width of the internal memory register","d":"The physical durability of the backing storage media","answer":"b"},{"id":1782296890755.0083,"question":"What advanced material property is currently being researched to enable the extreme data-routing speeds required by Fifth Generation AI systems?","a":"Fluted structural iron alloys","b":"Highly conductive electrical superconductors","c":"Highly conductive electrical superconductors (c) Miniaturized thermionic vacuum channels","d":"Flexible punched paper compound membranes","answer":"b"},{"id":1782296890755.2842,"question":"Why did early business calculators developed by IBM completely avoid the implementation of complex negative number logic?","a":"Corporate transactions structurally relied on subtraction operations and repeated addition rather than negative balances","b":"Binary digits could not represent values below zero","c":"Binary digits could not represent values below zero (c) Mechanical gear shafts were physically restricted from spinning counter-clockwise","d":"The U.S. Census Bureau explicitly banned negative numbers in national reports","answer":"a"},{"id":1782296890755.3813,"question":"What metric determines the total number of unique memory addresses that a central processing unit can directly access?","a":"The physical diameter of the silicon chip casing","b":"The bit-depth and structure of the system's address bus and word length","c":"The bit-depth and structure of the system's address bus and word length (c) The operational cycle speed of the cooling fan network","d":"The linear footprint of the external punch card hopper","answer":"b"},{"id":1782296890756.7844,"question":"Which design feature of Jacquard’s loom demonstrated for the first time that human expertise could be automated?","a":"The integration of an internal arithmetic logic unit","b":"The encoding of complex physical manipulation steps into a permanent, machine-readable storage medium","c":"The encoding of complex physical manipulation steps into a permanent, machine-readable storage medium (c) The use of a 5-horsepower steam-driven engine","d":"The implementation of real-time time sharing capabilities","answer":"b"},{"id":1782296890756.743,"question":"What is the fundamental difference between a computer's primary memory and its external backing storage devices?","a":"Primary memory is entirely mechanical, while backing storage relies on vacuum tubes","b":"Primary memory holds active data for rapid CPU access, while backing storage provides long-term, high-capacity data retention","c":"Primary memory holds active data for rapid CPU access, while backing storage provides long-term, high-capacity data retention (c) Backing storage is measured in Hertz, while primary memory is measured exclusively in bits","d":"Backing storage cannot be accessed without manual patch cords","answer":"b"},{"id":1782296890756.4353,"question":"Why did the U.S. military heavily invest in unconventional computing schemes during the peak of World War II?","a":"To automate the highly complex, labor-intensive calculation of ballistic firing tables for heavy artillery pieces","b":"To eliminate the use of binary numbers in battlefield communications","c":"To eliminate the use of binary numbers in battlefield communications (c) To construct the world's first localized personal computer network for soldiers","d":"To replace mechanical slide rules with automated textile manufacturing systems","answer":"a"},{"id":1782296890756.3352,"question":"What architectural choice made by Konrad Zuse in the construction of the Z3 computer set it apart from Charles Babbage's older designs?","a":"Zuse implemented a decimal-based calculation mill","b":"Zuse completely abandoned mechanical components in favor of integrated circuits","c":"Zuse completely abandoned mechanical components in favor of integrated circuits (c) Zuse utilized binary number representation instead of a decimal gear framework","d":"Zuse designed the machine to run entirely without a central control system","answer":"c"},{"id":1782296890756.9343,"question":"What does the term \"computer literacy\" specifically evaluate in modern societies?","a":"An individual's ability to manufacture a working silicon microprocessor chip","b":"An individual's access to and functional capability to operate computers, mobile phones, and digital networks","c":"An individual's access to and functional capability to operate computers, mobile phones, and digital networks (c) The total number of high-level languages an individual can compile manually","d":"The capacity of a human brain to calculate numeric tables backward","answer":"b"},{"id":1782296890756.9858,"question":"Which system is historical shorthand for the transition from unique, custom-built laboratory installations to mass-produced commercial computer systems?","a":"The Harvard Mark I","b":"The Universal Automatic Computer (UNIVAC)","c":"The Universal Automatic Computer (UNIVAC) (c) The Atanasoff-Berry Computer (ABC)","d":"The Leibniz Stepped Reckoner","answer":"b"},{"id":1782296890756.0928,"question":"What design trait allows a modern microprocessor to maintain backward compatibility with software written decades ago?","a":"The inclusion of physical vacuum tube arrays inside the silicon substrate","b":"Architectural adherence to standardized instruction set configurations across processor generations","c":"Architectural adherence to standardized instruction set configurations across processor generations (c) The structural conversion of modern code back into decimal gear movements","d":"The use of offline batch mode processing buffers","answer":"b"},{"id":1782296890756.2544,"question":"What primary limitation of human memory is successfully bypassed by the high-speed retrieval capabilities of modern computer storage?","a":"The human brain's inability to store emotional information","b":"The systemic human challenge of retrieving vast amounts of data both rapidly and with absolute accuracy","c":"The systemic human challenge of retrieving vast amounts of data both rapidly and with absolute accuracy (c) The human reliance on binary notation systems for simple recall","d":"The requirement for continuous electrical power to sustain thought patterns","answer":"b"},{"id":1782296890756.7463,"question":"What design strategy did Ted Hoff use to alter the development trajectory of the microcomputing industry in 1969?","a":"He hand-wired 18,000 vacuum tubes into a single typewriter-sized calculator","b":"He advocated for a universal, general-purpose programmable chip instead of multiple restrictive custom chips","c":"He advocated for a universal, general-purpose programmable chip instead of multiple restrictive custom chips (c) He developed a mechanical odometer that could automatically subtract negative numbers","d":"He established an antitrust lawsuit against the Tabulating Machine Company","answer":"b"},{"id":1782296890756.5493,"question":"Which programming language tier was explicitly developed during the Second Generation to allow the abstraction of binary code into symbolic words?","a":"Machine language","b":"Assembly language","c":"Assembly language (c) Object-oriented scripting","d":"Natural language query interfaces","answer":"b"},{"id":1782296890756.2993,"question":"What operational advantage did the ENIAC possess over the electromechanical Harvard Mark I computer?","a":"The ENIAC operated completely without any moving parts, allowing it to complete calculations significantly faster","b":"The ENIAC consumed dramatically less electrical power and emitted zero heat","c":"The ENIAC consumed dramatically less electrical power and emitted zero heat (c) The ENIAC possessed a much larger internal memory capacity capable of holding millions of numbers","d":"The ENIAC was highly portable and could fit inside the palm of a hand","answer":"a"},{"id":1782296890756.6484,"question":"What structural feature of the human brain is completely missing from modern digital computers, limiting their choice-making abilities?","a":"The capability to process high-speed mathematical operations","b":"Inherent cognitive intelligence, subjective perception, and independent problem generation","c":"Inherent cognitive intelligence, subjective perception, and independent problem generation (c) The use of binary data storage paths","d":"Connections to localized external data communication networks","answer":"b"},{"id":1782296890756.2598,"question":"What economic bottleneck is explicitly cited as an inhibiting factor when deploying widespread modern instructional computing networks?","a":"The high cost of acquiring hardware, software, and establishing communication infrastructure","b":"The physical weight of modern fiber-optic patch cords","c":"The physical weight of modern fiber-optic patch cords (c) The declining speed of modern microprocessor clock cycles","d":"The requirement to purchase blank punch cards by the linear foot","answer":"a"},{"id":1782296890756.6167,"question":"What historical observation on a passenger train inspired Herman Hollerith to encode human demographic profiles into punch cards?","a":"A driver adjusting steam valves based on track elevation data","b":"Train conductors punching distinct hole patterns in tickets to record physical traits and prevent fraud","c":"Train conductors punching distinct hole patterns in tickets to record physical traits and prevent fraud (c) The physical layout of textile looms being transported in cargo cars","d":"The rhythmic ticking frequency of the train's mechanical wheels","answer":"b"},{"id":1782296890756.3835,"question":"What specific computing milestone is represented by the historical completion of the ENIAC system?","a":"The world's first personal desktop computer architecture","b":"The foundation of the all-electronic general-purpose digital computing framework","c":"The foundation of the all-electronic general-purpose digital computing framework (c) The earliest implementation of a silicon microprocessor chip","d":"The invention of the mechanical gear-driven calculating clock","answer":"b"},{"id":1782296890756.7258,"question":"Which two high-level programming languages emerged during the Second Generation to allow scientists and businesses to write software abstractly?","a":"C++ and Java","b":"FORTRAN and COBOL","c":"FORTRAN and COBOL (c) Python and JavaScript","d":"Ada and Plankalkul","answer":"b"},{"id":1782296890756.1794,"question":"What technological evolution allowed Third Generation computers to become accessible to a much wider and less specialized audience?","a":"The introduction of room-sized mainframes powered by steam engines","b":"Lower production costs and smaller physical sizes driven by integrated circuit technology","c":"Lower production costs and smaller physical sizes driven by integrated circuit technology (c) The elimination of operating systems in favor of manual patch cords","d":"The mandatory teaching of classical Greek to computer operators","answer":"b"},{"id":1782296890756.1802,"question":"What design principle allows an embedded computer within a digital camera to operate without human intervention during a photo capture?","a":"Inherent emotional intelligence within the camera housing","b":"A pre-programmed automated sequence of tasks executed with precise internal timing","c":"A pre-programmed automated sequence of tasks executed with precise internal timing (c) Direct satellite communication links to a centralized supercomputer","d":"Real-time time sharing across multiple human network operators","answer":"b"},{"id":1782296890756.1555,"question":"Which structural asset did John von Neumann contribute to the development of the EDVAC architecture?","a":"The formalization of the electronic stored-program concept where instructions are managed as data","b":"The physical manufacturing of the first operational transistor element","c":"The physical manufacturing of the first operational transistor element (c) The design of the mechanical fluted drum for multiplication","d":"The creation of the key punch card reader system","answer":"a"},{"id":1782296890756.7937,"question":"Trend characterizes the transition of computing hardware from the First Generation through the Fourth Generation?","a":"An increase in physical size, heat output, and structural cost","b":"The continuous miniaturization of components paired with exponential increases in speed, reliability, and efficiency","c":"The continuous miniaturization of components paired with exponential increases in speed, reliability, and efficiency (c) A total reliance on machine language frameworks across all eras","d":"The steady replacement of electronic circuits with mechanical gear odometers","answer":"b"},{"id":1782296890756.9666,"question":"Why did the introduction of magnetic tape by the UNIVAC system cause significant public confusion in the 1950s?","a":"The public frequently confused the visual images of reel-to-reel tape decks with the mainframe computer itself","b":"Magnetic tape could only record audio signals and could not store data characters","c":"Magnetic tape could only record audio signals and could not store data characters (c) The tape required constant manual winding by teams of human computers","d":"It forced computers to utilize decimal arithmetic patterns","answer":"a"},{"id":1782296890756.1262,"question":"What critical feature of modern user interaction became prominent due to the microprocessor innovations of the Fourth Generation?","a":"Motorized teletype machines printing on paper rolls","b":"Graphical user interfaces, mice, and responsive handheld devices","c":"Graphical user interfaces, mice, and responsive handheld devices (c) Walls of physical knobs requiring structural realignment","d":"Offline key punch decks managed by university bookstores","answer":"b"},{"id":1782296890756.9434,"question":"What operational constraint of First Generation computers restricted them to solving only a single computational problem at a time?","a":"They lacked a centralized electrical power supply connection","b":"They relied strictly on rigid machine language architectures without multitasking operating systems","c":"They relied strictly on rigid machine language architectures without multitasking operating systems (c) Their internal memory drums could only hold one binary bit total","d":"They were physically limited to calculating household financial payroll files","answer":"b"},{"id":1782296890757.9324,"question":"Which historical entity provided funding for Charles Babbage’s original Difference Engine project due to the strategic value of accurate navigation charts?","a":"The United States Census Bureau","b":"The British Government","c":"The British Government (c) The International Business Machines Corporation","d":"The University of Pennsylvania Physics Department","answer":"b"},{"id":1782296890757.4714,"question":"What metric determines the processing power and throughput capacity of an integrated central processing unit chip?","a":"The linear footage of wire connected to the system's power supply","b":"The combined interaction of architectural word length, clock speed, and transistor density","c":"The combined interaction of architectural word length, clock speed, and transistor density (c) The physical volume of the air conditioning unit cooling the room","d":"The total number of characters printed per second by the teletype framework","answer":"b"},{"id":1782296890757.67,"question":"What structural asset allowed skilled abacus operators to achieve calculation speeds comparable to early electronic hand calculators?","a":"Internal electronic capacitor arrays","b":"The abacus acting as a structured physical memory aid to enhance human calculation mechanics","c":"The abacus acting as a structured physical memory aid to enhance human calculation mechanics (c) Integrated silicon circuits embedded within the sliding rings","d":"Automatic data processing streams running via a stored program","answer":"b"},{"id":1782296890757.4812,"question":"Which historical system is recognized as the first programmable digital computing device developed within the borders of the United States?","a":"The ENIAC mainframe","b":"The electromechanical Harvard Mark I","c":"The electromechanical Harvard Mark I (c) The Atanasoff-Berry Computer","d":"The UNIVAC commercial processor","answer":"b"},{"id":1782296890757.8584,"question":"What core design requirement makes correct programming absolutely essential to the operation of automated computer systems?","a":"Automated systems completely lack independent cognitive thought and will execute provided instructions to the letter, regardless of errors (GIGO)","b":"Programming code must be written in classical Greek to pass through silicon substrates","c":"Programming code must be written in classical Greek to pass through silicon substrates (c) Systems require constant manual gear adjustments if the program contains syntax loops","d":"Incorrect programming causes an immediate structural conversion of binary digits into decimal strings","answer":"a"},{"id":1782296890757.0479,"question":"The long-term evolutionary roadmap of Fifth Generation computing explicitly targets the realization of which technological frontiers?","a":"Miniaturized vacuum tubes, expanded punch card storage, and manual patch-cord routing","b":"Quantum computation, molecular nanotechnology, and advanced self-organizing natural language systems","c":"Quantum computation, molecular nanotechnology, and advanced self-organizing natural language systems (c) A return to room-sized mechanical calculation clocks driven by centralized steam shafts","d":"Single-tasking machine language frameworks running on electrostatic drums","answer":"b"},{"id":1782297558179.711,"question":"What mathematical system did John Napier invent in 1617 that allowed multiplication to be executed through addition?","a":"Calculus","b":"Binary notation","c":"Binary notation (c) Logarithms","d":"Matrix algebra","answer":"c"},{"id":1782297558179.48,"question":"What was the popular name given to the carved ivory sticks created by John Napier to perform multiplication?","a":"Pascalines","b":"Stepped Reckoners","c":"Stepped Reckoners (c) Napier's Bones","d":"Abacus rods","answer":"c"},{"id":1782297558179.0994,"question":"In which country was the slide rule first constructed in 1632, based directly on Napier's invention?","a":"Scotland","b":"Germany","c":"Germany (c) France","d":"England","answer":"d"},{"id":1782297558179.9854,"question":"Which Renaissance artist and inventor made detailed drawings of gear-driven calculating machines that were never actually built?","a":"Michelangelo","b":"Blaise Pascal","c":"Blaise Pascal (c) Leonardo da Vinci","d":"Gottfried Wilhelm Leibniz","answer":"c"},{"id":1782297558179.4697,"question":"FIVE. What was the name of the first gear-driven calculating machine invented by Wilhelm Schickard in 1623?","a":"Calculating Clock","b":"Stepped Reckoner","c":"Stepped Reckoner (c) Census Tabulator","d":"Difference Engine","answer":"a"},{"id":1782297558180.146,"question":"SIX. At what age did Blaise Pascal invent the gear-driven calculator known as the Pascaline in 1642?","a":"12 years old","b":"19 years old","c":"19 years old (c) 24 years old","d":"30 years old","answer":"a"},{"id":1782297558180.379,"question":"For what primary arithmetic operation was Pascal's Pascaline device designed?","a":"Long division","b":"Square roots","c":"Square roots (c) Addition","d":"Matrix multiplication","answer":"c"},{"id":1782297558180.4568,"question":"What was the name of the four-function mechanical calculator built by Gottfried Wilhelm Leibniz?","a":"Analytical Engine","b":"Hollerith Desk","c":"Hollerith Desk (c) Stepped Reckoner","d":"Difference Engine","answer":"c"},{"id":1782297558180.922,"question":"Which number system did Gottfried Wilhelm Leibniz strongly advocate for use in computation?","a":"Decimal system","b":"Binary system","c":"Binary system (c) Hexadecimal system","d":"Roman numerals","answer":"b"},{"id":1782297558180.498,"question":"What fundamental computer feature was missing from early slide rules and mechanical calculators?","a":"Gear systems","b":"Memory for storing information","c":"Memory for storing information (c) Metal casings","d":"User controls","answer":"b"},{"id":1782297558180.5403,"question":"Why were early mechanical calculators not considered true computers?","a":"They were not programmable","b":"They lacked moving parts","c":"They lacked moving parts (c) They relied on electricity","d":"They were too small","answer":"a"},{"id":1782297558180.524,"question":"In what year did Joseph-Marie Jacquard develop a machine that featured memory and programmability?","a":"1642","b":"1790","c":"1790 (c) 1801","d":"1822","answer":"c"},{"id":1782297558180.9485,"question":"What technology did Jacquard's loom use to feed instructions into the machine?","a":"Ivory sticks","b":"Fluted drums","c":"Fluted drums (c) Punched cards","d":"Magnetic tapes","answer":"c"},{"id":1782297558180.334,"question":"In 1822, what machine did Charles Babbage propose to compute mathematical tables?","a":"Analytic Engine","b":"Difference Engine","c":"Difference Engine (c) Census Tabulator","d":"Stepped Reckoner","answer":"b"},{"id":1782297558180.8044,"question":"What technology did Charles Babbage adopt to make the Analytic Engine programmable?","a":"Patch cords","b":"Punched cards","c":"Punched cards (c) Magnetic memory","d":"Teletype machines","answer":"b"},{"id":1782297558180.145,"question":"In Babbage's Analytic Engine, what were the names of the memory and processing units?","a":"RAM and CPU","b":"Store and Mill","c":"Store and Mill (c) Core and Drum","d":"Odometer and Clock","answer":"b"},{"id":1782297558180.893,"question":"Who is widely recognized as the world's first computer programmer?","a":"Blaise Pascal","b":"Ada Byron","c":"Ada Byron (c) Herman Hollerith","d":"Clifford Berry","answer":"b"},{"id":1782297558180.1914,"question":"Which programming concepts were pioneered by Ada Byron?","a":"Object orientation and inheritance","b":"Subroutines and looping","c":"Subroutines and looping (c) Compilation and interpretation","d":"Debugging and multithreading","answer":"b"},{"id":1782297558180.083,"question":"According to the U.S. Constitution, a national census must be conducted every how many years?","a":"Five years","b":"Seven years","c":"Seven years (c) Ten years","d":"Twelve years","answer":"c"},{"id":1782297558180.8025,"question":"Who won the competition to automate the processing of the 1890 U.S. Census?","a":"John von Neumann","b":"Herman Hollerith","c":"Herman Hollerith (c) J. V. Atanasoff","d":"Konrad Zuse","answer":"b"},{"id":1782297558180.13,"question":"Which device did Herman Hollerith's Census Tabulator use to detect holes punched in cards?","a":"Fluted drum","b":"Electrical patch cord","c":"Electrical patch cord (c) Card reader","d":"Teletype machine","answer":"c"},{"id":1782297558180.0627,"question":"Which of the following is NOT a function of a computer?","a":"Processing data","b":"Storing information","c":"Storing information (c) Making independent human judgments","d":"Producing output","answer":"c"},{"id":1782297558180.0605,"question":"Which function of a computer involves accepting data and instructions from the user?","a":"Processing","b":"Storage","c":"Storage (c) Input","d":"Output","answer":"c"}],"chapter2":[]};

     // The engine reads from browser storage. If empty, it assigns your master database.
     let localDB = JSON.parse(localStorage.getItem('COS110_LOCAL_DB'));
     
     if (!localDB || Object.keys(localDB).length === 0 || !localDB.chapter1 || localDB.chapter1.length === 0) {
         localDB = masterDatabase;
     }

     // Start up the view setup instantly
     renderChaptersMenu();
        
     // (The old duplicate const localDB line was deleted from right here)

     function switchScreen(targetId) {
         ['screen-welcome', 'screen-chapters', 'screen-quiz', 'screen-result', 'screen-preview'].forEach(id => {
             document.getElementById(id).classList.add('hidden');
         });
         document.getElementById(targetId).classList.remove('hidden');
     }
        function validateAndGoToChapters() {
            const name = document.getElementById('student-name').value.trim();
            let count = parseInt(document.getElementById('configured-count').value);

            if (!name) return alert("Please specify your name.");
            if (isNaN(count) || count < 30 || count > 50) return alert("Please choose a question count between 30 and 50.");

            appState.studentName = name;
            appState.targetCount = count;

            renderChaptersMenu();
            switchScreen('screen-chapters');
        }

        function renderChaptersMenu() {
            const grid = document.getElementById('chapters-buttons-grid');
            grid.innerHTML = "";
            for(let i = 1; i <= 8; i++) {
                const key = `chapter1`;
                const list = localDB[`chapter${i}`] || [];
                const btn = document.createElement('button');
                btn.className = "p-4 rounded-xl border border-slate-200 bg-white text-left hover:border-indigo-500 hover:bg-indigo-50/50 transition-all cursor-pointer flex justify-between items-center group";
                btn.onclick = () => launchExamTrack(`chapter${i}`);
                btn.innerHTML = `<div><span class="block font-bold text-slate-800 text-sm">Chapter ${i} Track</span><span class="text-xs text-slate-400">${list.length} items built</span></div><span class="text-indigo-600 font-bold">→</span>`;
                grid.appendChild(btn);
            }
        }

        function launchExamTrack(trackKey) {
            const trackData = localDB[trackKey] || [];
            if (trackData.length < appState.targetCount) {
                return alert(`This chapter only has ${trackData.length} items. You need to upload at least ${appState.targetCount} items in the Admin Panel first to run this configuration!`);
            }

            // Random Shuffler (Fisher-Yates)
            let shuffled = [...trackData].sort(() => 0.5 - Math.random());
            
            // Slice to exact chosen limit parameters
            appState.selectedPool = shuffled.slice(0, appState.targetCount);
            appState.currentQuestionIndex = 0;
            appState.answersRecorded = {};

            switchScreen('screen-quiz');
            renderActiveQuestion();
        }

        function runQuestionCountdown() {
            if(appState.countdownInterval) clearInterval(appState.countdownInterval);
            appState.timeRemaining = 10; // Reset countdown parameters
            document.getElementById('global-timer').innerText = `${appState.timeRemaining}s`;

            appState.countdownInterval = setInterval(() => {
                appState.timeRemaining--;
                document.getElementById('global-timer').innerText = `${appState.timeRemaining}s`;
                
                if(appState.timeRemaining <= 0) {
                    clearInterval(appState.countdownInterval);
                    advanceQuiz(); // Auto-advance when time is up
                }
            }, 1000);
        }

        function renderActiveQuestion() {
            runQuestionCountdown();
            const currentItem = appState.selectedPool[appState.currentQuestionIndex];
            
            document.getElementById('quiz-progress-text').innerText = `Question ${appState.currentQuestionIndex + 1} of ${appState.selectedPool.length}`;
            document.getElementById('quiz-progress-bar').style.width = `${((appState.currentQuestionIndex + 1) / appState.selectedPool.length) * 100}%`;
            document.getElementById('question-text').innerText = currentItem.question;
            document.getElementById('text-opt-a').innerText = currentItem.a;
            document.getElementById('text-opt-b').innerText = currentItem.b;
            document.getElementById('text-opt-c').innerText = currentItem.c;
            document.getElementById('text-opt-d').innerText = currentItem.d;

            ['a', 'b', 'c', 'd'].forEach(l => document.getElementById(`opt-${l}`).classList.remove('selected'));
            const prev = appState.answersRecorded[appState.currentQuestionIndex];
            if (prev) document.getElementById(`opt-${prev}`).classList.add('selected');

            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = (appState.currentQuestionIndex === appState.selectedPool.length - 1) ? "Submit Examination" : "Next Question";
        }

        function selectOption(letter) {
            appState.answersRecorded[appState.currentQuestionIndex] = letter;
            ['a', 'b', 'c', 'd'].forEach(l => document.getElementById(`opt-${l}`).classList.remove('selected'));
            document.getElementById(`opt-${letter}`).classList.add('selected');
        }

        function advanceQuiz() {
            if (appState.currentQuestionIndex < appState.selectedPool.length - 1) {
                appState.currentQuestionIndex++;
                renderActiveQuestion();
            } else {
                clearInterval(appState.countdownInterval);
                terminateAndSubmitQuiz();
            }
        }

        function terminateAndSubmitQuiz() {
            let rawScore = 0;
            appState.selectedPool.forEach((q, idx) => {
                if (appState.answersRecorded[idx] === q.answer) rawScore++;
            });
            const pct = Math.round((rawScore / appState.selectedPool.length) * 100);
            
            document.getElementById('result-display-name').innerText = appState.studentName;
            document.getElementById('final-score-display').innerText = `${rawScore} / ${appState.selectedPool.length}`;
            document.getElementById('final-percentage-display').innerText = `${pct}%`;
            switchScreen('screen-result');
        }

        function buildAndShowPreview() {
            const container = document.getElementById('preview-items-container');
            container.innerHTML = "";
            appState.selectedPool.forEach((item, idx) => {
                const studentSelection = appState.answersRecorded[idx] || "unanswered";
                const isCorrect = studentSelection === item.answer;
                const card = document.createElement('div');
                card.className = "p-4 rounded-xl bg-slate-50 border border-slate-200 text-left space-y-1 text-xs";
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-2">
                        <h4 class="font-bold text-slate-800">${idx + 1}. ${item.question}</h4>
                        <span class="font-bold px-2 py-0.5 rounded ${isCorrect ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}">${isCorrect ? 'Correct' : 'Missed'}</span>
                    </div>
                    <p class="text-slate-500">Your Answer: <span class="font-bold">(${studentSelection.toUpperCase()})</span> | Correct: <span class="font-bold text-emerald-600">(${item.answer.toUpperCase()}) ${item[item.answer]}</span></p>
                `;
                container.appendChild(card);
            });
            switchScreen('screen-preview');
        }
    </script>
