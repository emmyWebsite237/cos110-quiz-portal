<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COS 110 Portal | Exam Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(148, 163, 184, 0.05); border-radius: 20px; }
        .option-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 14px; cursor: pointer; transition: all 0.2s ease; }
        .option-card.selected { background: rgba(79, 70, 229, 0.06); border-color: #4f46e5; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <main class="w-full max-w-xl">

        <section id="screen-setup" class="glass-card p-8">
            <h2 class="text-2xl font-bold text-slate-900 mb-6 text-center">🎓 COS 110 Portal</h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Gemini API Key</label>
                    <input type="password" id="api-key-input" placeholder="Paste your API Key here..." class="w-full px-4 py-3 border rounded-xl bg-slate-50 text-sm focus:outline-none focus:border-indigo-600">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Upload Chapter Material (.txt)</label>
                    <input type="file" id="file-input" accept=".txt" class="w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Number of Questions</label>
                    <select id="question-count" class="w-full p-3 border rounded-xl bg-slate-50 text-sm">
                        <option value="5">5 Questions</option>
                        <option value="10" selected>10 Questions</option>
                        <option value="15">15 Questions</option>
                        <option value="20">20 Questions</option>
                    </select>
                </div>

                <button onclick="generateExam()" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-sm cursor-pointer transition-all">Upload & Generate Quiz</button>
            </div>
        </section>

        <section id="screen-loading" class="glass-card p-12 text-center hidden">
            <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-indigo-600 mx-auto mb-4"></div>
            <h3 class="text-lg font-bold text-slate-800">Reading Text Material...</h3>
            <p class="text-slate-400 text-xs mt-1">Generating your examination pool layout.</p>
        </section>

        <section id="screen-quiz" class="glass-card p-6 hidden">
            <div class="flex justify-between items-center mb-6">
                <span id="quiz-progress" class="text-xs font-bold text-slate-400 uppercase tracking-wider">Question 1 of --</span>
            </div>
            
            <div class="mb-6"><h3 id="question-text" class="text-lg font-bold text-slate-900 leading-relaxed">Loading...</h3></div>
            
            <div class="space-y-3 mb-6">
                <div onclick="selectOption('a')" id="opt-a" class="option-card p-4 flex items-center text-sm font-medium text-slate-700"><span class="font-bold text-indigo-600 mr-3">(a)</span><span id="text-opt-a"></span></div>
                <div onclick="selectOption('b')" id="opt-b" class="option-card p-4 flex items-center text-sm font-medium text-slate-700"><span class="font-bold text-indigo-600 mr-3">(b)</span><span id="text-opt-b"></span></div>
                <div onclick="selectOption('c')" id="opt-c" class="option-card p-4 flex items-center text-sm font-medium text-slate-700"><span class="font-bold text-indigo-600 mr-3">(c)</span><span id="text-opt-c"></span></div>
                <div onclick="selectOption('d')" id="opt-d" class="option-card p-4 flex items-center text-sm font-medium text-slate-700"><span class="font-bold text-indigo-600 mr-3">(d)</span><span id="text-opt-d"></span></div>
            </div>
            
            <div class="flex justify-end"><button id="next-btn" onclick="advanceQuiz()" class="px-6 py-2.5 bg-indigo-600 text-white font-semibold rounded-xl text-sm">Next Question</button></div>
        </section>

        <section id="screen-result" class="glass-card p-8 text-center hidden">
            <div class="text-4xl mb-3">🏆</div>
            <h2 class="text-xl font-bold text-slate-900">Quiz Completed</h2>
            <div class="my-4 text-4xl font-extrabold text-indigo-600" id="final-score">0 / 0</div>
            <button onclick="location.reload()" class="px-5 py-2 bg-slate-100 text-slate-700 border rounded-xl text-sm">Restart</button>
        </section>

    </main>

    <script>
        let quizData = [];
        let currentIndex = 0;
        let userAnswers = {};

        function switchScreen(id) {
            ['screen-setup', 'screen-loading', 'screen-quiz', 'screen-result'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function generateExam() {
            const apiKey = document.getElementById('api-key-input').value.trim();
            const fileInput = document.getElementById('file-input');
            const count = document.getElementById('question-count').value;

            if (!apiKey) return alert("Please type or paste your API key.");
            if (fileInput.files.length === 0) return alert("Please select a text file.");

            switchScreen('screen-loading');

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = async function(e) {
                const textContent = e.target.result;
                
                try {
                    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                    
                    const prompt = `Read the following text material and generate exactly ${count} multiple choice questions.
                    Return ONLY a valid JSON array matching this exact schema format without markdown tags or codeblocks:
                    [{"question":"...","a":"...","b":"...","c":"...","d":"...","answer":"correct_letter_lowercase"}]
                    
                    MATERIAL:\n${textContent}`;

                    const response = await fetch(endpoint, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    if (!response.ok) throw new Error("API rejected the key or request format.");

                    const resData = await response.json();
                    let rawText = resData.candidates[0].content.parts[0].text.trim();
                    
                    // Strip markdown wrapping if the model accidentally returns it
                    rawText = rawText.replace(/^```json/i, "").replace(/```$/, "").trim();
                    
                    quizData = JSON.parse(rawText);
                    currentIndex = 0;
                    userAnswers = {};

                    switchScreen('screen-quiz');
                    renderQuestion();

                } catch(err) {
                    console.error(err);
                    alert("Error processing text or contacting API: " + err.message);
                    switchScreen('screen-setup');
                }
            };
            reader.readAsText(file);
        }

        function renderQuestion() {
            const current = quizData[currentIndex];
            document.getElementById('quiz-progress').innerText = `Question ${currentIndex + 1} of ${quizData.length}`;
            document.getElementById('question-text').innerText = current.question;
            document.getElementById('text-opt-a').innerText = current.a;
            document.getElementById('text-opt-b').innerText = current.b;
            document.getElementById('text-opt-c').innerText = current.c;
            document.getElementById('text-opt-d').innerText = current.d;

            ['a', 'b', 'c', 'd'].forEach(l => document.getElementById(`opt-${l}`).classList.remove('selected'));
            if (userAnswers[currentIndex]) document.getElementById(`opt-${userAnswers[currentIndex]}`).classList.add('selected');

            document.getElementById('next-btn').innerText = (currentIndex === quizData.length - 1) ? "Finish" : "Next Question";
        }

        function selectOption(letter) {
            userAnswers[currentIndex] = letter;
            ['a', 'b', 'c', 'd'].forEach(l => document.getElementById(`opt-${l}`).classList.remove('selected'));
            document.getElementById(`opt-${letter}`).classList.add('selected');
        }

        function advanceQuiz() {
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderQuestion();
            } else {
                let score = 0;
                quizData.forEach((q, idx) => {
                    if (userAnswers[idx] === q.answer.toLowerCase()) score++;
                });
                document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
                switchScreen('screen-result');
            }
        }
    </script>
</body>
</html>
