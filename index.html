<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COS 110 Portal | Examination Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; width: 100%; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 10px 30px rgba(148, 163, 184, 0.12); border-radius: 24px; }
        .glass-input { background: rgba(255, 255, 255, 0.9); border: 1px solid #cbd5e1; border-radius: 14px; color: #0f172a; transition: all 0.3s ease; }
        .glass-input:focus { background: #ffffff; border-color: #4f46e5; box-shadow: 0 0 12px rgba(79, 70, 229, 0.15); outline: none; }
        .option-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; transition: all 0.2s ease; cursor: pointer; user-select: none; }
        .option-card:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .option-card.selected { background: linear-gradient(135deg, rgba(79, 70, 229, 0.08), rgba(147, 51, 234, 0.08)); border-color: #4f46e5; }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex items-center justify-center p-4 relative">

    <main class="w-full max-w-2xl z-10 my-6">

        <section id="screen-welcome" class="glass-card p-8 md:p-12 text-center">
            <div class="mb-6 flex justify-center">
                <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center border border-indigo-100 shadow-sm"><span class="text-2xl">📝</span></div>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">COS 110 Portal</h1>
            <p class="text-slate-500 mt-2 text-sm max-w-sm mx-auto">Enter your credentials to access the assessment tracks.</p>
            
            <div class="mt-6 max-w-md mx-auto text-left space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Student Full Name</label>
                    <input type="text" id="student-name" placeholder="Enter full name..." class="w-full px-4 py-3 glass-input text-base">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Questions to Load (30 - 50)</label>
                    <input type="number" id="configured-count" value="30" min="30" max="50" class="w-full px-4 py-3 glass-input text-base">
                </div>
            </div>

            <button onclick="validateAndGoToChapters()" class="mt-8 px-8 py-3.5 bg-indigo-600 hover:bg-indigo-700 font-semibold text-white rounded-xl shadow-md transition-all cursor-pointer">
                Proceed to Chapters
            </button>
        </section>


        <section id="screen-chapters" class="glass-card p-8 hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-slate-900">Select Assessment Track</h2>
            </div>
            
            <div id="chapters-buttons-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                </div>
            
            <button onclick="switchScreen('screen-welcome')" class="mt-6 text-xs text-slate-400 hover:text-slate-600 font-medium transition-colors">← Back</button>
        </section>


        <section id="screen-quiz" class="glass-card p-6 md:p-8 hidden">
            <div class="flex justify-between items-center mb-4">
                <span id="quiz-progress-text" class="text-xs font-bold text-slate-400 uppercase">Question 1 of --</span>
                <div class="flex items-center space-x-2 bg-red-50 border border-red-100 px-4 py-1.5 rounded-full">
                    <span class="w-2 h-2 rounded-full bg-red-500 animate-ping"></span>
                    <span id="global-timer" class="text-sm font-mono font-bold text-red-600">10s</span>
                </div>
            </div>

            <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden mb-6">
                <div id="quiz-progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-300" style="width: 0%"></div>
            </div>

            <div class="mb-6"><h3 id="question-text" class="text-lg font-bold text-slate-900 leading-relaxed">Loading question data...</h3></div>

            <div class="space-y-3 mb-6">
                <div onclick="selectOption('a')" id="opt-a" class="option-card p-4 flex items-center"><span class="w-7 h-7 rounded bg-slate-50 flex items-center justify-center font-bold text-xs mr-4 border border-slate-200 shrink-0">(A)</span><span id="text-opt-a" class="text-slate-700 text-sm font-medium"></span></div>
                <div onclick="selectOption('b')" id="opt-b" class="option-card p-4 flex items-center"><span class="w-7 h-7 rounded bg-slate-50 flex items-center justify-center font-bold text-xs mr-4 border border-slate-200 shrink-0">(B)</span><span id="text-opt-b" class="text-slate-700 text-sm font-medium"></span></div>
                <div onclick="selectOption('c')" id="opt-c" class="option-card p-4 flex items-center"><span class="w-7 h-7 rounded bg-slate-50 flex items-center justify-center font-bold text-xs mr-4 border border-slate-200 shrink-0">(C)</span><span id="text-opt-c" class="text-slate-700 text-sm font-medium"></span></div>
                <div onclick="selectOption('d')" id="opt-d" class="option-card p-4 flex items-center"><span class="w-7 h-7 rounded bg-slate-50 flex items-center justify-center font-bold text-xs mr-4 border border-slate-200 shrink-0">(D)</span><span id="text-opt-d" class="text-slate-700 text-sm font-medium"></span></div>
            </div>

            <div class="flex justify-end">
                <button id="next-btn" onclick="advanceQuiz()" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl text-sm transition-all cursor-pointer">Next Question</button>
            </div>
        </section>


        <section id="screen-result" class="glass-card p-8 text-center hidden">
            <div class="text-4xl mb-3">🏆</div>
            <h2 class="text-2xl font-bold text-slate-900">Session Complete</h2>
            <p class="text-slate-500 text-sm mt-1">Thank you, <span id="result-display-name" class="font-semibold text-slate-800"></span>.</p>
            
            <div class="my-6">
                <span class="block text-xs uppercase tracking-wider text-slate-400 font-semibold mb-1">Total Score</span>
                <div class="text-5xl font-extrabold text-indigo-600" id="final-score-display">0 / 0</div>
                <div class="text-sm font-bold text-slate-500 mt-2 bg-slate-100 inline-block px-4 py-1 rounded-full border border-slate-200" id="final-percentage-display">0%</div>
            </div>

            <div class="flex flex-col sm:flex-row gap-2 justify-center">
                <button onclick="buildAndShowPreview()" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold rounded-xl cursor-pointer">Review Performance Preview</button>
                <button onclick="location.reload()" class="px-5 py-2 bg-slate-100 text-slate-700 text-xs border border-slate-200 rounded-xl cursor-pointer">Start New Run</button>
            </div>
        </section>


        <section id="screen-preview" class="glass-card p-6 hidden">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-200">
                <h2 class="text-lg font-bold text-slate-900">Performance Assessment Sheet</h2>
                <button onclick="switchScreen('screen-result')" class="text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 cursor-pointer">Back</button>
            </div>
            <div id="preview-items-container" class="space-y-4 max-h-[55vh] overflow-y-auto pr-2"></div>
        </section>

    </main>

    <script>
        let appState = { studentName: "", targetCount: 30, selectedPool: [], currentQuestionIndex: 0, answersRecorded: {}, countdownInterval: null, timeRemaining: 10 };
        const localDB = JSON.parse(localStorage.getItem('COS110_LOCAL_DB')) || {};

        function switchScreen(targetId) {
            ['screen-welcome', 'screen-chapters', 'screen-quiz', 'screen-result', 'screen-preview'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(targetId).classList.remove('hidden');
        }

        function validateAndGoToChapters() {
            const name = document.getElementById('student-name').value.trim();
            let count = parseInt(document.getElementById('configured-count').value);

            if (!name) return alert("Please specify your name.");
            if (isNaN(count) || count < 30 || count > 50) return alert("Please choose a question count between 30 and 50.");

            appState.studentName = name;
            appState.targetCount = count;

            renderChaptersMenu();
            switchScreen('screen-chapters');
        }

        function renderChaptersMenu() {
            const grid = document.getElementById('chapters-buttons-grid');
            grid.innerHTML = "";
            for(let i = 1; i <= 8; i++) {
                const key = `chapter1`;
                const list = localDB[`chapter${i}`] || [];
                const btn = document.createElement('button');
                btn.className = "p-4 rounded-xl border border-slate-200 bg-white text-left hover:border-indigo-500 hover:bg-indigo-50/50 transition-all cursor-pointer flex justify-between items-center group";
                btn.onclick = () => launchExamTrack(`chapter${i}`);
                btn.innerHTML = `<div><span class="block font-bold text-slate-800 text-sm">Chapter ${i} Track</span><span class="text-xs text-slate-400">${list.length} items built</span></div><span class="text-indigo-600 font-bold">→</span>`;
                grid.appendChild(btn);
            }
        }

        function launchExamTrack(trackKey) {
            const trackData = localDB[trackKey] || [];
            if (trackData.length < appState.targetCount) {
                return alert(`This chapter only has ${trackData.length} items. You need to upload at least ${appState.targetCount} items in the Admin Panel first to run this configuration!`);
            }

            // Random Shuffler (Fisher-Yates)
            let shuffled = [...trackData].sort(() => 0.5 - Math.random());
            
            // Slice to exact chosen limit parameters
            appState.selectedPool = shuffled.slice(0, appState.targetCount);
            appState.currentQuestionIndex = 0;
            appState.answersRecorded = {};

            switchScreen('screen-quiz');
            renderActiveQuestion();
        }

        function runQuestionCountdown() {
            if(appState.countdownInterval) clearInterval(appState.countdownInterval);
            appState.timeRemaining = 10; // Reset countdown parameters
            document.getElementById('global-timer').innerText = `${appState.timeRemaining}s`;

            appState.countdownInterval = setInterval(() => {
                appState.timeRemaining--;
                document.getElementById('global-timer').innerText = `${appState.timeRemaining}s`;
                
                if(appState.timeRemaining <= 0) {
                    clearInterval(appState.countdownInterval);
                    advanceQuiz(); // Auto-advance when time is up
                }
            }, 1000);
        }

        function renderActiveQuestion() {
            runQuestionCountdown();
            const currentItem = appState.selectedPool[appState.currentQuestionIndex];
            
            document.getElementById('quiz-progress-text').innerText = `Question ${appState.currentQuestionIndex + 1} of ${appState.selectedPool.length}`;
            document.getElementById('quiz-progress-bar').style.width = `${((appState.currentQuestionIndex + 1) / appState.selectedPool.length) * 100}%`;
            document.getElementById('question-text').innerText = currentItem.question;
            document.getElementById('text-opt-a').innerText = currentItem.a;
            document.getElementById('text-opt-b').innerText = currentItem.b;
            document.getElementById('text-opt-c').innerText = currentItem.c;
            document.getElementById('text-opt-d').innerText = currentItem.d;

            ['a', 'b', 'c', 'd'].forEach(l => document.getElementById(`opt-${l}`).classList.remove('selected'));
            const prev = appState.answersRecorded[appState.currentQuestionIndex];
            if (prev) document.getElementById(`opt-${prev}`).classList.add('selected');

            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = (appState.currentQuestionIndex === appState.selectedPool.length - 1) ? "Submit Examination" : "Next Question";
        }

        function selectOption(letter) {
            appState.answersRecorded[appState.currentQuestionIndex] = letter;
            ['a', 'b', 'c', 'd'].forEach(l => document.getElementById(`opt-${l}`).classList.remove('selected'));
            document.getElementById(`opt-${letter}`).classList.add('selected');
        }

        function advanceQuiz() {
            if (appState.currentQuestionIndex < appState.selectedPool.length - 1) {
                appState.currentQuestionIndex++;
                renderActiveQuestion();
            } else {
                clearInterval(appState.countdownInterval);
                terminateAndSubmitQuiz();
            }
        }

        function terminateAndSubmitQuiz() {
            let rawScore = 0;
            appState.selectedPool.forEach((q, idx) => {
                if (appState.answersRecorded[idx] === q.answer) rawScore++;
            });
            const pct = Math.round((rawScore / appState.selectedPool.length) * 100);
            
            document.getElementById('result-display-name').innerText = appState.studentName;
            document.getElementById('final-score-display').innerText = `${rawScore} / ${appState.selectedPool.length}`;
            document.getElementById('final-percentage-display').innerText = `${pct}%`;
            switchScreen('screen-result');
        }

        function buildAndShowPreview() {
            const container = document.getElementById('preview-items-container');
            container.innerHTML = "";
            appState.selectedPool.forEach((item, idx) => {
                const studentSelection = appState.answersRecorded[idx] || "unanswered";
                const isCorrect = studentSelection === item.answer;
                const card = document.createElement('div');
                card.className = "p-4 rounded-xl bg-slate-50 border border-slate-200 text-left space-y-1 text-xs";
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-2">
                        <h4 class="font-bold text-slate-800">${idx + 1}. ${item.question}</h4>
                        <span class="font-bold px-2 py-0.5 rounded ${isCorrect ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}">${isCorrect ? 'Correct' : 'Missed'}</span>
                    </div>
                    <p class="text-slate-500">Your Answer: <span class="font-bold">(${studentSelection.toUpperCase()})</span> | Correct: <span class="font-bold text-emerald-600">(${item.answer.toUpperCase()}) ${item[item.answer]}</span></p>
                `;
                container.appendChild(card);
            });
            switchScreen('screen-preview');
        }
    </script>
</body>
</html>
