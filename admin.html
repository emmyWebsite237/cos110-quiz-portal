<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COS 110 | Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Question Pool Manager</h1>
                <p class="text-sm text-slate-500">Bulk-paste structured question sheets instantly across 8 Chapters.</p>
            </div>
            <a href="index.html" class="px-4 py-2 text-sm font-semibold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-xl transition-all">
                Go to Exam Portal →
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-5 space-y-4">
                
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Target Track / Chapter</label>
                    <select id="global-track" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold focus:outline-none focus:border-indigo-500">
                        <option value="chapter1">Chapter 1</option> <option value="chapter2">Chapter 2</option>
                        <option value="chapter3">Chapter 3</option> <option value="chapter4">Chapter 4</option>
                        <option value="chapter5">Chapter 5</option> <option value="chapter6">Chapter 6</option>
                        <option value="chapter7">Chapter 7</option> <option value="chapter8">Chapter 8</option>
                    </select>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="mb-3">
                        <h2 class="text-base font-bold text-slate-800">Bulk Text Parser</h2>
                        <p class="text-[11px] text-slate-400 mt-0.5">Separate raw blocks using an empty line.</p>
                    </div>
                    
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Raw Dump Window</label>
                            <textarea id="bulk-raw-text" rows="12" placeholder="1. Question here? (a) Option A (b) Option B (c) Option C (d) Option D&#10;Answer: (b)&#10;&#10;2. Next question... (a) Option A (b) Option B (c) Option C (d) Option D&#10;Answer: (a)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-mono text-xs focus:outline-none focus:border-indigo-500 leading-relaxed"></textarea>
                        </div>
                        <button onclick="processBulkTextDump()" class="w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-sm rounded-xl transition-all cubic-bezier cursor-pointer">
                            Run Structural Extraction
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-6">
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <span class="block text-xs font-bold text-slate-400 uppercase mb-3">Live Chapter Counts</span>
                    <div class="grid grid-cols-4 gap-2 text-center text-xs">
                        <div class="p-2 bg-slate-50 rounded border border-slate-100"><strong>CH1:</strong> <span id="count-c1">0</span></div>
                        <div class="p-2 bg-slate-50 rounded border border-slate-100"><strong>CH2:</strong> <span id="count-c2">0</span></div>
                        <div class="p-2 bg-slate-50 rounded border border-slate-100"><strong>CH3:</strong> <span id="count-c3">0</span></div>
                        <div class="p-2 bg-slate-50 rounded border border-slate-100"><strong>CH4:</strong> <span id="count-c4">0</span></div>
                        <div class="p-2 bg-slate-50 rounded border border-slate-100"><strong>CH5:</strong> <span id="count-c5">0</span></div>
                        <div class="p-2 bg-slate-50 rounded border border-slate-100"><strong>CH6:</strong> <span id="count-c6">0</span></div>
                        <div class="p-2 bg-slate-50 rounded border border-slate-100"><strong>CH7:</strong> <span id="count-c7">0</span></div>
                        <div class="p-2 bg-slate-50 rounded border border-slate-100"><strong>CH8:</strong> <span id="count-c8">0</span></div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-base font-bold text-slate-800">Active Database Question Index</h2>
                        <button onclick="clearAllData()" class="text-xs font-semibold text-red-500 hover:text-red-700 cursor-pointer">Wipe Everything</button>
                    </div>
                    <div id="questions-list-container" class="space-y-4 max-h-[55vh] overflow-y-auto pr-2"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const chaptersList = ['chapter1', 'chapter2', 'chapter3', 'chapter4', 'chapter5', 'chapter6', 'chapter7', 'chapter8'];
        let db = JSON.parse(localStorage.getItem('COS110_LOCAL_DB')) || {};
        chaptersList.forEach(c => { if(!db[c]) db[c] = []; });

        function processBulkTextDump() {
            const track = document.getElementById('global-track').value;
            const rawText = document.getElementById('bulk-raw-text').value.trim();
            if(!rawText) return alert("Text area is empty.");

            const rawBlocks = rawText.split(/\n\s*\n/);
            let addedCount = 0;

            rawBlocks.forEach(block => {
                if(!block.trim()) return;
                let assignedAnswer = "a";
                let normalizedText = block.trim();

                const answerMatch = normalizedText.match(/Answer:\s*\(([a-d])\)/i);
                if (answerMatch) {
                    assignedAnswer = answerMatch[1].toLowerCase();
                    normalizedText = normalizedText.replace(/Answer:\s*\(([a-d])\)/i, "").trim();
                }

                normalizedText = normalizedText.replace(/\s+/g, ' ');

                const regexA = /\s*\(a\)\s*/i; const regexB = /\s*\(b\)\s*/i;
                const regexC = /\s*\(c\)\s*/i; const regexD = /\s*\(d\)\s*/i;

                if(regexA.test(normalizedText) && regexB.test(normalizedText) && regexC.test(normalizedText) && regexD.test(normalizedText)) {
                    const partsA = normalizedText.split(regexA);
                    const questionStr = partsA[0].replace(/^\d+[\.\s]*/, '').trim();
                    
                    const partsB = partsA[1].split(regexB);
                    const optA = partsB[0].trim();

                    const partsC = partsB[1].split(regexC);
                    const optB = partsC[0].trim();

                    const partsD = partsC[1].split(regexD);
                    const optC = partsD[0].trim();
                    const optD = partsD[1].trim();

                    db[track].push({
                        id: Date.now() + Math.random(),
                        question: questionStr,
                        a: optA, b: optB, c: optC, d: optD,
                        answer: assignedAnswer
                    });
                    addedCount++;
                }
            });

            alert(`Successfully integrated ${addedCount} questions into ${track}!`);
            document.getElementById('bulk-raw-text').value = "";
            saveAndRefresh();
        }

        function toggleAnswer(track, id, currentAns) {
            const sequence = ['a', 'b', 'c', 'd'];
            let nextIndex = (sequence.indexOf(currentAns) + 1) % 4;
            const targetQuestion = db[track].find(q => q.id === id);
            if(targetQuestion) {
                targetQuestion.answer = sequence[nextIndex];
                saveAndRefresh();
            }
        }

        function deleteQuestion(track, id) {
            db[track] = db[track].filter(q => q.id !== id);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('COS110_LOCAL_DB', JSON.stringify(db));
            renderDashboardData();
        }

        function clearAllData() {
            if(confirm("Wipe all data arrays across all 8 Chapters?")) {
                chaptersList.forEach(c => db[c] = []);
                saveAndRefresh();
            }
        }

        function renderDashboardData() {
            chaptersList.forEach((c, idx) => {
                document.getElementById(`count-c${idx+1}`).innerText = db[c].length;
            });

            const container = document.getElementById('questions-list-container');
            container.innerHTML = "";

            let hasItems = false;
            chaptersList.forEach(trackKey => {
                db[trackKey].forEach((item, index) => {
                    hasItems = true;
                    const card = document.createElement('div');
                    card.className = "p-4 rounded-xl bg-slate-50 border border-slate-200 relative text-sm space-y-1";
                    card.innerHTML = `
                        <span class="inline-block text-[10px] font-bold uppercase bg-indigo-50 border border-indigo-100 text-indigo-600 px-2 py-0.5 rounded mb-1">${trackKey.toUpperCase()} — Item #${index + 1}</span>
                        <p class="font-bold text-slate-800 pr-10">${item.question}</p>
                        <div class="grid grid-cols-2 gap-1 text-xs text-slate-500 pt-1">
                            <p><strong>(a)</strong> ${item.a}</p> <p><strong>(b)</strong> ${item.b}</p>
                            <p><strong>(c)</strong> ${item.c}</p> <p><strong>(d)</strong> ${item.d}</p>
                        </div>
                        <div class="pt-2 flex items-center gap-2">
                            <button onclick="toggleAnswer('${trackKey}', ${item.id}, '${item.answer}')" class="px-2 py-0.5 rounded text-xs font-bold bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100 cursor-pointer">
                                Correct: (${item.answer.toUpperCase()})
                            </button>
                        </div>
                        <button onclick="deleteQuestion('${trackKey}', ${item.id})" class="absolute top-2 right-4 text-slate-400 hover:text-red-500 font-bold text-base cursor-pointer">×</button>
                    `;
                    container.appendChild(card);
                });
            });

            if(!hasItems) {
                container.innerHTML = `<p class="text-center text-slate-400 text-sm py-6">All database layouts are currently empty.</p>`;
            }
        }

        renderDashboardData();
    </script>
</body>
</html>
