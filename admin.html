<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COS 110 | Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- HEADER -->
        <div class="flex justify-between items-center bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Question Pool Manager</h1>
                <p class="text-sm text-slate-500">Bulk-paste structured question sheets instantly.</p>
            </div>
            <a href="index.html" class="px-4 py-2 text-sm font-semibold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-xl transition-all">
                Go to Exam Portal →
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- LEFT COLUMN: INPUT METHODS (SPAN 5) -->
            <div class="lg:col-span-5 space-y-4">
                
                <!-- TARGET TRACK SELECTION (GLOBAL) -->
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Target Track / Chapter</label>
                    <select id="global-track" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm font-semibold focus:outline-none focus:border-indigo-500">
                        <option value="chapter1">Chapter 1 Track</option>
                        <option value="chapter2">Chapter 2 Track</option>
                    </select>
                </div>

                <!-- MODE TABS -->
                <div class="flex bg-slate-200 p-1 rounded-xl">
                    <button id="tab-bulk" onclick="switchMode('bulk')" class="w-full py-2 text-xs font-bold rounded-lg text-slate-700 bg-white shadow-xs cursor-pointer">Bulk Paste Engine</button>
                    <button id="tab-single" onclick="switchMode('single')" class="w-full py-2 text-xs font-bold rounded-lg text-slate-500 hover:text-slate-700 cursor-pointer hidden">Single Question</button>
                </div>

                <!-- BULK ENGINE PANEL -->
                <div id="panel-bulk" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="mb-3">
                        <h2 class="text-base font-bold text-slate-800">Bulk Text Parser</h2>
                        <p class="text-[11px] text-slate-400 mt-0.5">Separate raw blocks using an empty line. Follow your specified structure accurately.</p>
                    </div>
                    
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Raw Dump Window</label>
                            <textarea id="bulk-raw-text" rows="12" placeholder="1. Question here? (a) Option A (b) Option B (c) Option C (d) Option D&#10;Answer: (b)&#10;&#10;2. Next question... (a) Option A (b) Option B (c) Option C (d) Option D&#10;Answer: (a)" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-mono text-xs focus:outline-none focus:border-indigo-500 leading-relaxed"></textarea>
                        </div>
                        <button onclick="processBulkTextDump()" class="w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-sm rounded-xl transition-all cursor-pointer">
                            Run Structural Extraction
                        </button>
                    </div>
                </div>

                <!-- SINGLE ENTRY FORM (OPTIONAL BACKUP) -->
                <div id="panel-single" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hidden">
                    <h2 class="text-base font-bold text-slate-800 mb-4">Add Single Item</h2>
                    <form id="question-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Question Body</label>
                            <textarea id="form-question" rows="2" placeholder="Enter question..." class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500"></textarea>
                        </div>
                        <div class="space-y-2">
                            <input type="text" id="form-opt-a" placeholder="Option A" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                            <input type="text" id="form-opt-b" placeholder="Option B" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                            <input type="text" id="form-opt-c" placeholder="Option C" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                            <input type="text" id="form-opt-d" placeholder="Option D" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm">
                        </div>
                        <div>
                            <select id="form-answer" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm">
                                <option value="a">(a)</option> <option value="b">(b)</option> <option value="c">(c)</option> <option value="d">(d)</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full py-2.5 bg-indigo-600 text-white font-semibold text-sm rounded-xl">Commit Item</button>
                    </form>
                </div>

            </div>

            <!-- RIGHT COLUMN: PREVIEW LIST (SPAN 7) -->
            <div class="lg:col-span-7 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <span class="block text-xs font-medium text-slate-400">Chapter 1 Total Items</span>
                        <span id="count-c1" class="text-2xl font-bold text-slate-800">0</span>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <span class="block text-xs font-medium text-slate-400">Chapter 2 Total Items</span>
                        <span id="count-c2" class="text-2xl font-bold text-slate-800">0</span>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-base font-bold text-slate-800">Active Database Question Index</h2>
                        <button onclick="clearAllData()" class="text-xs font-semibold text-red-500 hover:text-red-700 cursor-pointer">Wipe Everything</button>
                    </div>
                    <div id="questions-list-container" class="space-y-4 max-h-[65vh] overflow-y-auto pr-2"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('COS110_LOCAL_DB')) || { chapter1: [], chapter2: [] };

        function switchMode(mode) {
            if(mode === 'single') {
                document.getElementById('panel-single').classList.remove('hidden');
                document.getElementById('panel-bulk').classList.add('hidden');
            } else {
                document.getElementById('panel-single').classList.add('hidden');
                document.getElementById('panel-bulk').classList.remove('hidden');
            }
        }

        // Bulk text parser engine matching exact "Answer: (x)" layout lines
        function processBulkTextDump() {
            const track = document.getElementById('global-track').value;
            const rawText = document.getElementById('bulk-raw-text').value.trim();
            if(!rawText) return alert("Text area is empty.");

            // Split items using double carriage line breaks
            const rawBlocks = rawText.split(/\n\s*\n/);
            let addedCount = 0;

            rawBlocks.forEach(block => {
                if(!block.trim()) return;

                // Extract and clean out the Answer parameter string row
                let assignedAnswer = "a"; // baseline fallback context
                let normalizedText = block.trim();

                const answerMatch = normalizedText.match(/Answer:\s*\(([a-d])\)/i);
                if (answerMatch) {
                    assignedAnswer = answerMatch[1].toLowerCase();
                    // Remove the Answer declaration row so it doesn't leak into option D string calculations
                    normalizedText = normalizedText.replace(/Answer:\s*\(([a-d])\)/i, "").trim();
                }

                // Compress spaces for standard RegEx split parameters
                normalizedText = normalizedText.replace(/\s+/g, ' ');

                const regexA = /\s*\(a\)\s*/i;
                const regexB = /\s*\(b\)\s*/i;
                const regexC = /\s*\(c\)\s*/i;
                const regexD = /\s*\(d\)\s*/i;

                if(regexA.test(normalizedText) && regexB.test(normalizedText) && regexC.test(normalizedText) && regexD.test(normalizedText)) {
                    const partsA = normalizedText.split(regexA);
                    const questionStr = partsA[0].replace(/^\d+[\.\s]*/, '').trim(); // Strips numeric prefixes like "1."
                    
                    const partsB = partsA[1].split(regexB);
                    const optA = partsB[0].trim();

                    const partsC = partsB[1].split(regexC);
                    const optB = partsC[0].trim();

                    const partsD = partsB[1].split(regexD);
                    const optC = partsD[0].trim();
                    const optD = partsD[1].trim();

                    db[track].push({
                        id: Date.now() + Math.random(),
                        question: questionStr,
                        a: optA,
                        b: optB,
                        c: optC,
                        d: optD,
                        answer: assignedAnswer
                    });
                    addedCount++;
                }
            });

            alert(`Successfully integrated ${addedCount} questions into database metrics!`);
            document.getElementById('bulk-raw-text').value = "";
            saveAndRefresh();
        }

        function toggleAnswer(track, id, currentAns) {
            const sequence = ['a', 'b', 'c', 'd'];
            let nextIndex = (sequence.indexOf(currentAns) + 1) % 4;
            const targetQuestion = db[track].find(q => q.id === id);
            if(targetQuestion) {
                targetQuestion.answer = sequence[nextIndex];
                saveAndRefresh();
            }
        }

        function deleteQuestion(track, id) {
            db[track] = db[track].filter(q => q.id !== id);
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('COS110_LOCAL_DB', JSON.stringify(db));
            renderDashboardData();
        }

        function clearAllData() {
            if(confirm("Are you sure you want to completely clear this database?")) {
                db = { chapter1: [], chapter2: [] };
                saveAndRefresh();
            }
        }

        function renderDashboardData() {
            document.getElementById('count-c1').innerText = db.chapter1.length;
            document.getElementById('count-c2').innerText = db.chapter2.length;
            const container = document.getElementById('questions-list-container');
            container.innerHTML = "";

            ['chapter1', 'chapter2'].forEach(trackKey => {
                db[trackKey].forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = "p-4 rounded-xl bg-slate-50 border border-slate-200 relative text-sm space-y-1";
                    card.innerHTML = `
                        <span class="inline-block text-[10px] font-bold uppercase bg-indigo-50 border border-indigo-100 text-indigo-600 px-2 py-0.5 rounded mb-1">${trackKey} — Item #${index + 1}</span>
                        <p class="font-bold text-slate-800 pr-10">${item.question}</p>
                        <div class="grid grid-cols-2 gap-1 text-xs text-slate-500 pt-1">
                            <p><strong>(a)</strong> ${item.a}</p> <p><strong>(b)</strong> ${item.b}</p>
                            <p><strong>(c)</strong> ${item.c}</p> <p><strong>(d)</strong> ${item.d}</p>
                        </div>
                        <div class="pt-2 flex items-center gap-2">
                            <span class="text-xs text-slate-500">Correct Target:</span>
                            <button onclick="toggleAnswer('${trackKey}', ${item.id}, '${item.answer}')" class="px-2 py-0.5 rounded text-xs font-bold bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100 cursor-pointer">
                                (${item.answer.toUpperCase()}) — Click to toggle adjust
                            </button>
                        </div>
                        <button onclick="deleteQuestion('${trackKey}', ${item.id})" class="absolute top-2 right-4 text-slate-400 hover:text-red-500 font-bold text-base cursor-pointer">×</button>
                    `;
                    container.appendChild(card);
                });
            });

            if(db.chapter1.length === 0 && db.chapter2.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 text-sm py-6">Your data layout index is empty.</p>`;
            }
        }

        renderDashboardData();
    </script>
</body>
</html>
