<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COS 110 | Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Question Pool Manager</h1>
                <p class="text-sm text-slate-500">Add, view, and manage your local exam tracks.</p>
            </div>
            <a href="index.html" class="px-4 py-2 text-sm font-semibold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-xl transition-all">
                Go to Exam Portal →
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-fit">
                <h2 class="text-lg font-bold text-slate-800 mb-4">Add New Question</h2>
                <form id="question-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Select Track / Chapter</label>
                        <select id="form-track" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                            <option value="chapter1">Chapter 1</option>
                            <option value="chapter2">Chapter 2</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Question Body</label>
                        <textarea id="form-question" rows="3" placeholder="Enter question description..." class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500" required></textarea>
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Options Layout</label>
                        <input type="text" id="form-opt-a" placeholder="Option A" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" required>
                        <input type="text" id="form-opt-b" placeholder="Option B" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" required>
                        <input type="text" id="form-opt-c" placeholder="Option C" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" required>
                        <input type="text" id="form-opt-d" placeholder="Option D" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-indigo-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Correct Answer Index Tag</label>
                        <select id="form-answer" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500">
                            <option value="a">(a)</option>
                            <option value="b">(b)</option>
                            <option value="c">(c)</option>
                            <option value="d">(d)</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm rounded-xl shadow-sm transition-all cursor-pointer">
                        Commit Question to Database
                    </button>
                </form>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <span class="block text-xs font-medium text-slate-400">Chapter 1 Total</span>
                        <span id="count-c1" class="text-2xl font-bold text-slate-800">0</span>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <span class="block text-xs font-medium text-slate-400">Chapter 2 Total</span>
                        <span id="count-c2" class="text-2xl font-bold text-slate-800">0</span>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold text-slate-800">Active Database Question Index</h2>
                        <button onclick="clearAllData()" class="text-xs font-semibold text-red-500 hover:text-red-700 cursor-pointer">Wipe Everything</button>
                    </div>
                    <div id="questions-list-container" class="space-y-4 max-h-[50vh] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('COS110_LOCAL_DB')) || { chapter1: [], chapter2: [] };

        document.getElementById('question-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const track = document.getElementById('form-track').value;
            
            const newQuestion = {
                id: Date.now(),
                question: document.getElementById('form-question').value.trim(),
                a: document.getElementById('form-opt-a').value.trim(),
                b: document.getElementById('form-opt-b').value.trim(),
                c: document.getElementById('form-opt-c').value.trim(),
                d: document.getElementById('form-opt-d').value.trim(),
                answer: document.getElementById('form-answer').value
            };

            db[track].push(newQuestion);
            saveAndRefresh();
            this.reset();
            document.getElementById('form-track').value = track; // keep the selected track
        });

        function saveAndRefresh() {
            localStorage.setItem('COS110_LOCAL_DB', JSON.stringify(db));
            renderDashboardData();
        }

        function deleteQuestion(track, id) {
            db[track] = db[track].filter(q => q.id !== id);
            saveAndRefresh();
        }

        function clearAllData() {
            if(confirm("Are you sure you want to completely erase the entire database? This action is irreversible.")) {
                db = { chapter1: [], chapter2: [] };
                saveAndRefresh();
            }
        }

        function renderDashboardData() {
            document.getElementById('count-c1').innerText = db.chapter1.length;
            document.getElementById('count-c2').innerText = db.chapter2.length;

            const container = document.getElementById('questions-list-container');
            container.innerHTML = "";

            ['chapter1', 'chapter2'].forEach(trackKey => {
                db[trackKey].forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = "p-4 rounded-xl bg-slate-50 border border-slate-200 relative text-sm space-y-1";
                    card.innerHTML = `
                        <span class="inline-block text-[10px] font-bold uppercase tracking-wider bg-indigo-50 border border-indigo-100 text-indigo-600 px-2 py-0.5 rounded mb-1">${trackKey} — Item #${index + 1}</span>
                        <p class="font-bold text-slate-800 pr-10">${item.question}</p>
                        <div class="grid grid-cols-2 gap-1 text-xs text-slate-500 pt-1">
                            <p><strong>(a)</strong> ${item.a}</p> <p><strong>(b)</strong> ${item.b}</p>
                            <p><strong>(c)</strong> ${item.c}</p> <p><strong>(d)</strong> ${item.d}</p>
                        </div>
                        <p class="text-xs text-emerald-600 font-bold pt-1">Correct Tag Target: (${item.answer.toUpperCase()})</p>
                        <button onclick="deleteQuestion('${trackKey}', ${item.id})" class="absolute top-2 right-4 text-slate-400 hover:text-red-500 font-bold transition-colors cursor-pointer text-base">×</button>
                    `;
                    container.appendChild(card);
                });
            });

            if(db.chapter1.length === 0 && db.chapter2.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 text-sm py-6">Your query database layout index is empty.</p>`;
            }
        }

        // Run baseline load metrics
        renderDashboardData();
    </script>
</body>
</html>
